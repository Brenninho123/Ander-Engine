name: Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.2
      
      - name: Install hxpkg
        shell: bash
        run: |
          # Instala silenciosamente sem pipe
          haxelib install hxpkg --always
      
      - name: Build
        shell: bash
        run: |
          haxelib run hxpkg install --force
          haxelib run hxpkg build windows -release
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: export/release/windows/bin/