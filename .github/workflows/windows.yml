name: Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      HAXE_VERSION: 4.3.2
      HAXELIB_PATH: C:\haxelib

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      # Cache haxelib
      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: ${{ env.HAXELIB_PATH }}
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/project.xml') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      # Cache hxcpp build
      - name: Cache hxcpp
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.hxcpp_config
            C:\Users\runneradmin\AppData\Roaming\haxelib\hxcpp
          key: ${{ runner.os }}-hxcpp

      - name: Setup Haxelib
        shell: powershell
        run: |
          haxelib setup $env:HAXELIB_PATH

      - name: Install Dependencies
        shell: powershell
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui --quiet
          haxelib install hxcpp --quiet
          haxelib install hscript --quiet
          haxelib install polymod --quiet
          haxelib install hxCodec --quiet

          haxelib run lime setup
          haxelib run lime rebuild hxcpp windows

      - name: Build Windows Release
        shell: powershell
        run: haxelib run lime build windows -release

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path export\release\windows\bin\* `
            -DestinationPath Ander-Engine-Windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ander-Engine-Windows
          path: Ander-Engine-Windows.zip