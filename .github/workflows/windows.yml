name: Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      HAXE_VERSION: 4.3.2
      HAXELIB_PATH: C:\haxelib

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Setup Haxelib Path
        shell: powershell
        run: |
          mkdir $env:HAXELIB_PATH -ErrorAction SilentlyContinue
          haxelib setup $env:HAXELIB_PATH

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: ${{ env.HAXELIB_PATH }}
          key: ${{ runner.os }}-haxelib-${{ hashFiles('project.hxp') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install HXP
        shell: powershell
        run: |
          haxelib install hxpkg --quiet

      - name: Install Dependencies (HXP)
        shell: powershell
        run: |
          haxelib run hxpkg install --force

      - name: Build Windows Release (HXP)
        shell: powershell
        run: |
          haxelib run hxpkg build windows -release

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path export\release\windows\bin\* `
            -DestinationPath Ander-Engine-Windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ander-Engine-Windows
          path: Ander-Engine-Windows.zip